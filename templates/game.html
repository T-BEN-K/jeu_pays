<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Partie en cours - Jeu des Pays</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>🌍 Partie en cours</h1>
    <div id="turn"></div>
    <h2>Choisis un joueur cible</h2>
    <select id="targetSelect"></select>
    <h2>Propose une lettre</h2>
    <input type="text" id="letterInput" maxlength="1" placeholder="Lettre">
    <button id="guessBtn">Proposer</button>
    <div id="scores"></div>
    <div id="notepad"></div>
  </div>
  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
  <script>
    const socket=io();
    const username=localStorage.getItem("username");
    document.getElementById('guessBtn').onclick=()=>{
      const letter=document.getElementById('letterInput').value.toUpperCase().replace(/[^A-Z]/g,'');
      const target=document.getElementById('targetSelect').value;
      if(letter&&target){socket.emit('guess_letter',{username,target,letter});document.getElementById('letterInput').value="";}
    };
    document.getElementById('letterInput').addEventListener("keyup",(e)=>{if(e.key==="Enter"){document.getElementById('guessBtn').click();}});
    socket.on('update_turn',(player)=>{
      document.getElementById('turn').innerHTML=`🎯 Tour de ${player}`;
      const myTurn=(player===username);
      document.getElementById('letterInput').disabled=!myTurn;
      document.getElementById('guessBtn').disabled=!myTurn;
      document.getElementById('targetSelect').disabled=!myTurn;
    });
