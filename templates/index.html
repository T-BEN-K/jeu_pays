<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Jeu des Pays</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    
    <!-- 1. ÉCRAN D'ACCUEIL / LOBBY (Visible au départ) -->
    <div id="lobby-screen">
      <h1>🌍 Bienvenue au Jeu des Pays</h1>
      <p id="status">Entrez un pseudo et votre pays secret pour commencer.</p>
      <div id="authPanel" class="auth-panel">
        <input type="text" id="usernameInput" maxlength="12" placeholder="Pseudo" autocomplete="username">
        <input type="text" id="countryInput" maxlength="30" placeholder="Pays" autocomplete="off">
        <button id="connectBtn">Se connecter</button>
        <div id="authMessage" class="message-box"></div>
      </div>
      <div id="players"></div>
      <button id="readyBtn" disabled>Je suis prêt</button>
      <button id="clearLobbyBtn" class="secondary-button" style="display:none;">Vider la liste</button>
    </div>

    <!-- 2. ÉCRAN DE JEU (Masqué au départ, s'affichera au lancement) -->
    <div id="game-screen" style="display: none;">
      <h1>🌍 Partie en cours</h1>
      <div id="turn" class="status-panel">Chargement du tour...</div>
      <div id="timer" class="status-panel">Temps restant : 00s</div>

      <div class="game-grid">
        <div class="card">
          <h2>Choisis une cible</h2>
          <select id="targetSelect" disabled></select>
          <h2>Propose une lettre</h2>
          <input type="text" id="letterInput" maxlength="1" placeholder="Lettre" autocomplete="off" disabled>
          <button id="guessBtn" disabled>Proposer la lettre</button>

          <h2>Propose un pays</h2>
          <input type="text" id="countryInput" maxlength="30" placeholder="Pays" autocomplete="off" disabled>
          <button id="guessCountryBtn" disabled>Proposer le pays</button>
          <button id="resetBtn" class="secondary-button">Réinitialiser la partie</button>
          <div id="messageBox" class="message-box">En attente du tour ou du début de partie...</div>
          
          <div class="chat-panel">
            <h2>Chat</h2>
            <div id="history" class="history-box"></div>
            <input type="text" id="chatInput" placeholder="Message public" autocomplete="off" disabled>
            <button id="sendChatBtn" disabled>Envoyer</button>
          </div>
          
          <h2>Scores</h2>
          <div id="scores" class="scoreboard"></div>
          <div id="revealedWords" class="revealed-words" style="display:none;"></div>
          <h2>État des joueurs</h2>
          <div id="playersState" class="players-state"></div>
        </div>
      </div>

      <div class="card notepad-card">
        <h2>Bloc-notes</h2>
        <div id="notepad" class="notepad"></div>
      </div>
    </div>

  </div>

  <!-- UN SEUL IMPORT SOCKET.IO -->
  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
  
  <!-- UN SEUL BLOC SCRIPT CENTRALISÉ -->
  <script>
    // --- VARIABLES ET INITIALISATION ---
    const socket = io();
    let currentPlayers = {};
    let playersState = {};
    let currentScores = {};

    function setAuthMessage(message, isError = false) {
      const authMessage = document.getElementById('authMessage');
      if (!authMessage) return;
      authMessage.textContent = message;
      authMessage.style.color = isError ? '#b00020' : '#1f6f3f';
    }

    function setAuthVisible(visible) {
      const authPanel = document.getElementById('authPanel');
      if (!authPanel) return;
      authPanel.style.display = visible ? 'flex' : 'none';
    }

    function clearStoredSession() {
      sessionStorage.removeItem('username');
      sessionStorage.removeItem('country');
    }

    function readEnteredPlayerInfo() {
      const usernameInput = document.getElementById('usernameInput');
      const countryInput = document.getElementById('countryInput');
      const rawUser = (usernameInput?.value || '').trim().toUpperCase().replace(/[^A-Z]/g, '');
      const rawCountry = (countryInput?.value || '').trim().toUpperCase().replace(/[^A-Z]/g, '');
      if (!rawUser || !rawCountry || rawCountry.length < 2) {
        setAuthMessage('Entre un pseudo et un pays valide (2 lettres minimum).', true);
        return null;
      }
      return { username: rawUser, country: rawCountry };
    }

    function persistPlayerInfo(info) {
      if (!info) return;
      sessionStorage.setItem('username', info.username);
      sessionStorage.setItem('country', info.country);
    }

    function connectWithStoredInfo() {
      const storedUsername = sessionStorage.getItem('username');
      const storedCountry = sessionStorage.getItem('country');
      if (!storedUsername || !storedCountry) {
        setAuthVisible(true);
        setAuthMessage('Saisis ton pseudo et ton pays pour rejoindre le salon.');
        return;
      }
      username = storedUsername;
      country = storedCountry;
      setAuthVisible(false);
      setAuthMessage('Connexion en cours…');
      socket.emit('reconnect_player', { username, country });
    }

    let username = sessionStorage.getItem('username');
    let country = sessionStorage.getItem('country');

    if (username && country) {
      connectWithStoredInfo();
    } else {
      setAuthVisible(true);
      setAuthMessage('Saisis ton pseudo et ton pays pour rejoindre le salon.');
    }

    // Récupération des éléments du DOM
    const targetSelect = document.getElementById('targetSelect');
    const connectBtn = document.getElementById('connectBtn');
    const letterInput = document.getElementById('letterInput');
    const guessBtn = document.getElementById('guessBtn');
    const countryInput = document.getElementById('countryInput');
    const guessCountryBtn = document.getElementById('guessCountryBtn');
    const resetBtn = document.getElementById('resetBtn');
    const clearLobbyBtn = document.getElementById('clearLobbyBtn');
    const chatInput = document.getElementById('chatInput');
    const replayBtnId = 'replayBtn';
    const sendChatBtn = document.getElementById('sendChatBtn');
    const turnLabel = document.getElementById('turn');
    const timerLabel = document.getElementById('timer');
    const scoresDiv = document.getElementById('scores');
    const revealedWordsDiv = document.getElementById('revealedWords');
    const playersStateDiv = document.getElementById('playersState');
    const notepadDiv = document.getElementById('notepad');
    const historyDiv = document.getElementById('history');
    const messageBox = document.getElementById('messageBox');

    if (username && country) {
      document.getElementById('status').textContent = `Connexion en cours pour ${username}.`;
    } else {
      document.getElementById('status').textContent = 'Entrez un pseudo et votre pays secret pour commencer.';
    }

    // --- FONCTIONS DE RENDU ---
    function renderTurn(current) {
      turnLabel.innerHTML = `🎯 Tour de ${current}`;
      const isMyTurn = current === username;
      letterInput.disabled = !isMyTurn;
      guessBtn.disabled = !isMyTurn;
      countryInput.disabled = !isMyTurn;
      guessCountryBtn.disabled = !isMyTurn;
      targetSelect.disabled = !isMyTurn;
      if (isMyTurn) {
        messageBox.textContent = 'C’est ton tour ! Choisis une cible et propose une lettre ou un pays.';
      }
    }

    function renderScores(players, scores) {
      let html = '<table><tr><th>Joueur</th><th>Score</th></tr>';
      for (const name in players) {
        html += `<tr><td>${name.toUpperCase()}</td><td>${scores[name] || 0}</td></tr>`;
      }
      html += '</table>';
      scoresDiv.innerHTML = html;
    }

    function renderRevealedWords(players) {
      let html = '<h3>Mots actuels</h3><ul>';
      for (const name in players) {
        const info = players[name];
        html += `<li><strong>${name} :</strong> ${info.revealed.join(' ')}</li>`;
      }
      html += '</ul>';
      revealedWordsDiv.innerHTML = html;
    }

    function renderPlayersState(players) {
      let html = '';
      for (const name in players) {
        const info = players[name];
        html += `<div class="player-card ${info.eliminated ? 'eliminated' : ''}">`;
        html += `<strong>${name.toUpperCase()}${name === username ? ' (TOI)' : ''}</strong><br>`;
        html += `${info.eliminated ? 'ÉLIMINÉ' : info.ready ? 'EN JEU' : 'EN ATTENTE'} • ${info.country.length} LETTRES`;
        html += `</div>`;
      }
      playersStateDiv.innerHTML = html;
    }

    function renderLobbyPlayers(players) {
      const visiblePlayers = Object.entries(players).filter(([, player]) => player && player.online !== false);
      let html = '<h2>Joueurs connectés</h2>';
      if (!visiblePlayers.length) {
        html += '<div class="player-card">Aucun joueur en ligne.</div>';
      } else {
        for (const [p, player] of visiblePlayers) {
          html += `<div class="player-card">${p}${p === username ? ' (toi)' : ''} - ${player.country.length} lettres - ${player.ready ? '✅ prêt' : '⏳ en attente'}</div>`;
        }
      }
      document.getElementById('players').innerHTML = html;
      const isLobbyVisible = document.getElementById('lobby-screen').style.display !== 'none';
      const canClear = isLobbyVisible && visiblePlayers.length > 1 && visiblePlayers[0] && visiblePlayers[0][0] === username;
      clearLobbyBtn.style.display = canClear ? 'block' : 'none';
    }

    function updateChatAccess(players) {
      const me = players[username];
      const enabled = Boolean(me && !me.eliminated);
      chatInput.disabled = !enabled;
      sendChatBtn.disabled = !enabled;
    }

    function renderHistory(history) {
      if (!history || !history.length) {
        historyDiv.innerHTML = '<p>Aucune action pour l’instant.</p>';
        return;
      }
      let html = '<ul>';
      for (const item of history.slice(-20)) {
        html += `<li>${item}</li>`;
      }
      html += '</ul>';
      historyDiv.innerHTML = html;
    }

    function renderTargetList(players) {
      const options = ['<option value="">-- Choisis une cible --</option>'];
      for (const name in players) {
        const info = players[name];
        if (name !== username && !info.eliminated) {
          options.push(`<option value="${name}">${name} (${info.country.length} lettres)</option>`);
        }
      }
      targetSelect.innerHTML = options.join('');
    }

    function renderNotepad(players) {
      const names = Object.keys(players);
      if (!names.length) {
        notepadDiv.innerHTML = '<p>En attente des joueurs...</p>';
        return;
      }
      const maxLength = Math.max(...names.map(name => players[name].country.length));
      let html = '<table class="notepad-table"><thead><tr><th>Joueur</th>';
      for (let i = 1; i <= maxLength; i++) {
        html += `<th>${i}</th>`;
      }
      html += '</tr></thead><tbody>';

      for (const name of names) {
        const info = players[name];
        html += '<tr>';
        html += `<td class="player-name">${name}${info.eliminated ? ' ✖' : ''}</td>`;
        for (let pos = 0; pos < maxLength; pos++) {
          if (pos < info.country.length) {
            const letter = info.revealed[pos] || '_';
            html += `<td class="letter-box">${letter}</td>`;
          } else {
            html += '<td class="letter-box empty">-</td>';
          }
        }
        html += '</tr>';
      }
      html += '</tbody></table>';
      notepadDiv.innerHTML = html;
    }

    function updateState(players, scores) {
      playersState = players;
      currentScores = scores || currentScores;
      renderPlayersState(playersState);
      updateChatAccess(playersState);
      renderTargetList(playersState);
      renderNotepad(playersState);
      renderScores(playersState, currentScores);
      renderRevealedWords(playersState);
    }

    function setTimer(value) {
      timerLabel.textContent = `Temps restant : ${value}s`;
    }

    // --- ÉCOUTEURS D'ÉVÉNEMENTS ---
    connectBtn.addEventListener('click', () => {
      const info = readEnteredPlayerInfo();
      if (!info) return;
      persistPlayerInfo(info);
      username = info.username;
      country = info.country;
      setAuthVisible(false);
      setAuthMessage('Connexion en cours…');
      socket.emit('register', { username, country });
    });

    document.getElementById('usernameInput').addEventListener('keyup', (event) => {
      if (event.key === 'Enter') connectBtn.click();
    });

    document.getElementById('countryInput').addEventListener('keyup', (event) => {
      if (event.key === 'Enter') connectBtn.click();
    });

    document.getElementById('readyBtn').onclick = () => {
      socket.emit('set_ready', { username });
      document.getElementById('readyBtn').disabled = true;
      document.getElementById('status').textContent = 'Prêt ! En attente du lancement.';
    };

    guessBtn.addEventListener('click', () => {
      const letter = letterInput.value.toUpperCase().replace(/[^A-Z]/g, '');
      const target = targetSelect.value;
      if (!letter) {
        messageBox.textContent = 'Choisis une lettre valide.';
        return;
      }
      if (!target) {
        messageBox.textContent = 'Sélectionne une cible avant de proposer.';
        return;
      }
      socket.emit('guess_letter', { username, target, letter });
      letterInput.value = '';
      letterInput.focus();
    });

    guessCountryBtn.addEventListener('click', () => {
      const country = countryInput.value.toUpperCase().replace(/[^A-Z]/g, '');
      const target = targetSelect.value;
      if (!country) {
        messageBox.textContent = 'Écris un pays valide.';
        return;
      }
      if (!target) {
        messageBox.textContent = 'Sélectionne une cible avant de proposer un pays.';
        return;
      }
      socket.emit('guess_country', { username, target, country });
      countryInput.value = '';
      countryInput.focus();
    });

    resetBtn.addEventListener('click', () => {
      if (confirm('Réinitialiser la partie ? Tous les scores seront remis à zéro.')) {
        socket.emit('reset_game', { username });
      }
    });

    clearLobbyBtn.addEventListener('click', () => {
      if (confirm('Vider le salon ? Tous les autres joueurs seront retirés.')) {
        socket.emit('clear_lobby', { username });
      }
    });

    function addReplayButton() {
      if (document.getElementById(replayBtnId)) return;
      const button = document.createElement('button');
      button.id = replayBtnId;
      button.className = 'secondary-button';
      button.textContent = 'Rejouer';
      button.onclick = () => {
        socket.emit('reset_game', { username });
      };
      messageBox.appendChild(button);
    }

    sendChatBtn.addEventListener('click', () => {
      const text = chatInput.value.trim();
      if (!text) return;
      socket.emit('chat_message', { username, text });
      chatInput.value = '';
    });

    letterInput.addEventListener('keyup', (event) => {
      if (event.key === 'Enter') guessBtn.click();
    });

    countryInput.addEventListener('keyup', (event) => {
      if (event.key === 'Enter') guessCountryBtn.click();
    });

    // --- ENTRÉES SOCKET.IO ---
    socket.on('registration_failed', (data) => {
      clearStoredSession();
      username = '';
      country = '';
      setAuthVisible(true);
      setAuthMessage(data ? data.message : 'Inscription échouée.', true);
      document.getElementById('status').textContent = 'Connexion impossible. Réessaie avec un pseudo et un pays valides.';
    });

    socket.on('reconnect_failed', (data) => {
      clearStoredSession();
      username = '';
      country = '';
      setAuthVisible(true);
      setAuthMessage(data ? data.message : 'Reconnexion impossible.', true);
      document.getElementById('status').textContent = 'Connexion impossible. Réessaie avec un pseudo et un pays valides.';
    });

    socket.on('reconnect_success', () => {
      document.getElementById('status').textContent = `Reconnecté en tant que ${username}.`;
      setAuthVisible(false);
      setAuthMessage(`Reconnecté en tant que ${username}.`);
      socket.emit('force_state', {});
    });

    socket.on('update_players', (players) => {
      currentPlayers = players;
      renderLobbyPlayers(players);
      if (players[username]) {
        document.getElementById('readyBtn').disabled = players[username].ready;
      }
      updateState(players, currentScores);
    });

    // BASCULE D'ÉCRAN SANS RECHARGEMENT
    socket.on('game_start', () => { 
      document.getElementById('lobby-screen').style.display = 'none';
      document.getElementById('game-screen').style.display = 'block';
    });

    socket.on('game_active', (data) => {
      if (data && data.active && currentPlayers[username] && !currentPlayers[username].active) {
        document.getElementById('status').textContent = 'Partie en cours, tu attends la prochaine manche.';
      }
    });

    socket.on('update_timer', (data) => {
      if (data && typeof data.value === 'number') {
        setTimer(data.value);
      }
    });

    socket.on('update_scores', (scores) => {
      renderScores(playersState, scores);
    });

    socket.on('update_turn', (current) => {
      renderTurn(current);
    });

    socket.on('update_history', (history) => {
      renderHistory(history);
    });

    socket.on('chat_message', (data) => {
      if (Array.isArray(data.history)) {
        renderHistory(data.history);
      }
    });

    socket.on('update_word', (data) => {
      if (playersState[data.target]) {
        playersState[data.target].revealed = data.revealed;
        renderNotepad(playersState);
      }
    });

    socket.on('player_eliminated', (data) => {
      if (playersState[data.target]) {
        playersState[data.target].eliminated = true;
        renderPlayersState(playersState);
        renderNotepad(playersState);
      }
      messageBox.textContent = `${data.target} est éliminé par ${data.by} !`;
    });

    socket.on('show_final_scores', (data) => {
      const ranking = Array.isArray(data.ranking) ? data.ranking : Object.entries(data.scores || {}).sort((a, b) => b[1] - a[1]).map(([name, score]) => ({ name, score, country: currentPlayers[name]?.country || '' }));
      const rankingHtml = ranking.map((entry, index) => `<li>${index + 1}. ${entry.name.toUpperCase()} — ${entry.score} POINT${entry.score > 1 ? 'S' : ''}</li>`).join('');
      const countriesHtml = ranking.map((entry) => `<li>${entry.name.toUpperCase()} : ${entry.country.toUpperCase()}</li>`).join('');
      messageBox.innerHTML = `
        <div class="game-over-card">
          <div class="game-over-title">🏁 SCORE FINAL</div>
          <ul class="ranking-list">${rankingHtml}</ul>
          <div style="margin-top:10px;"><strong>PAYS DES JOUEURS</strong></div>
          <ul class="country-list">${countriesHtml}</ul>
        </div>`;
      if (document.getElementById(replayBtnId)) {
        document.getElementById(replayBtnId).remove();
      }
      addReplayButton();
    });

    socket.on('game_over', (data) => {
      const ranking = Array.isArray(data.ranking) ? data.ranking : Object.entries(data.scores || {}).sort((a, b) => b[1] - a[1]).map(([name, score]) => ({ name, score, country: currentPlayers[name]?.country || '' }));
      const podium = ranking.slice(0, 3).map((entry, index) => {
        const rankClass = index === 0 ? 'first' : index === 1 ? 'second' : 'third';
        return `<div class="podium-item ${rankClass}"><strong>${['🥇', '🥈', '🥉'][index]}</strong><br>${entry.name.toUpperCase()}<br>${entry.score} POINT${entry.score > 1 ? 'S' : ''}</div>`;
      }).join('');
      const rankingHtml = ranking.map((entry, index) => `<li>${index + 1}. ${entry.name.toUpperCase()} — ${entry.score} POINT${entry.score > 1 ? 'S' : ''}</li>`).join('');
      const countriesHtml = ranking.map((entry) => `<li>${entry.name.toUpperCase()} : ${entry.country.toUpperCase()}</li>`).join('');
      messageBox.innerHTML = `
        <div class="game-over-card">
          <div class="game-over-title">🎉 FIN DE PARTIE</div>
          <div class="podium">${podium}</div>
          <div><strong>CLASSEMENT</strong></div>
          <ul class="ranking-list">${rankingHtml}</ul>
          <div style="margin-top:10px;"><strong>PAYS DES JOUEURS</strong></div>
          <ul class="country-list">${countriesHtml}</ul>
        </div>`;
      addReplayButton();
      letterInput.disabled = true;
      countryInput.disabled = true;
      guessBtn.disabled = true;
      guessCountryBtn.disabled = true;
      targetSelect.disabled = true;
    });

    socket.on('game_reset', (data) => {
      updateState(data.players, data.scores);
      renderLobbyPlayers(data.players);
      if (document.getElementById(replayBtnId)) {
        document.getElementById(replayBtnId).remove();
      }
      messageBox.textContent = 'Partie réinitialisée. Préparez-vous à repartir !';
      letterInput.disabled = true;
      countryInput.disabled = true;
      guessBtn.disabled = true;
      guessCountryBtn.disabled = true;
      targetSelect.disabled = true;
      chatInput.disabled = true;
      sendChatBtn.disabled = true;
      setTimer(0);
      
      // Retour automatique à la salle d'attente
      document.getElementById('game-screen').style.display = 'none';
      document.getElementById('lobby-screen').style.display = 'block';
    });

    socket.on('message', (data) => {
      messageBox.textContent = data.text;
    });

    socket.emit('force_state', {});
    window.addEventListener('beforeunload', () => {
      if (username) {
        socket.emit('leave_game', { username: username });
      }
    });
  </script>
</body>
</html>
