<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Accueil - Jeu des Pays</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>🎮 Jeu des Pays</h1>
    <p id="status">En attente des joueurs...</p>
    <div id="players"></div>
    <button id="readyBtn">Je suis prêt</button>
  </div>

  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
  <script>
    const socket = io();
    let username = prompt("Ton pseudo ?").toUpperCase();
    let country = prompt("Ton pays secret ?").toUpperCase().replace(/[^A-Z]/g, '');
    localStorage.setItem("username", username);

    socket.emit('register', {username, country});

    socket.on('update_players', (players) => {
      let html = "<h2>Joueurs connectés</h2>";
      for (let p in players) {
        html += `<div class="player-card">${p} (${players[p].ready ? '✅' : '❌'}) - ${players[p].country.length} lettres</div>`;
      }
      document.getElementById('players').innerHTML = html;
    });

    document.getElementById('readyBtn').onclick = () => {
      socket.emit('set_ready', {username});
    };

    socket.on('game_start', () => {
      window.location.href = "/game";
    });
  </script>
</body>
</html>
