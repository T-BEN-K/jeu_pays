<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Accueil - Jeu des Pays</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>🌍 Bienvenue au Jeu des Pays</h1>
    <p id="status">Entrez un pseudo et votre pays secret pour commencer.</p>
    <div id="players"></div>
    <button id="readyBtn" disabled>Je suis prêt</button>
  </div>
  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
  <script>
    const socket = io();

    function askForPlayerInfo() {
      let username = '';
      let country = '';
      while (!username) {
        username = prompt('Ton pseudo ?').toUpperCase().replace(/[^A-Z]/g, '');
      }
      while (!country) {
        country = prompt('Ton pays secret ?').toUpperCase().replace(/[^A-Z]/g, '');
      }
      localStorage.setItem('username', username);
      localStorage.setItem('country', country);
      return { username, country };
    }

    let username = localStorage.getItem('username');
    let country = localStorage.getItem('country');
    if (!username || !country) {
      const info = askForPlayerInfo();
      username = info.username;
      country = info.country;
    }

    document.getElementById('status').textContent = `Connecté en tant que ${username}.`;
    socket.emit('register', { username, country });

    socket.on('registration_failed', (data) => {
      alert(data.message);
      localStorage.removeItem('username');
      localStorage.removeItem('country');
      window.location.reload();
    });

    socket.on('update_players', (players) => {
      let html = '<h2>Joueurs connectés</h2>';
      for (const p in players) {
        const player = players[p];
        html += `<div class="player-card">${p}${p === username ? ' (toi)' : ''} - ${player.country.length} lettres - ${player.ready ? '✅ prêt' : '⏳ en attente'}</div>`;
      }
      document.getElementById('players').innerHTML = html;
      document.getElementById('readyBtn').disabled = players[username] && players[username].ready;
    });

    document.getElementById('readyBtn').onclick = () => {
      socket.emit('set_ready', { username });
      document.getElementById('readyBtn').disabled = true;
      document.getElementById('status').textContent = 'Prêt ! En attente du lancement.';
    };

    socket.on('game_start', () => { window.location.href = '/game'; });
  </script>
</body>
</html>
